<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171C27"/>
      <stop offset="100%" stop-color="#0B0E14"/>
    </linearGradient>

    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="55%" stop-color="#0B0E14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0B0E14" stop-opacity="1"/>
    </linearGradient>

    <pattern id="diagonal" width="14" height="14" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <radialGradient id="glow" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <rect width="800" height="450" fill="url(#diagonal)"/>
  <rect width="800" height="450" fill="url(#fade)"/>

  <!-- hairline border -->
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#232838" stroke-width="1"/>

  <!-- status pill -->
  <g transform="translate(28,28)">
    <rect width="126" height="26" rx="13" fill="#0B0E14" fill-opacity="0.6" stroke="#C9A227" stroke-opacity="0.35"/>
    <circle cx="15" cy="13" r="3.5" fill="#C9A227"/>
    <circle cx="15" cy="13" r="3.5" fill="#C9A227" fill-opacity="0.35">
      <animate attributeName="r" values="3.5;8;3.5" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="28" y="17" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="0.5" fill="#C9A227">BUILDING</text>
  </g>

  <!-- centerpiece: terminal-style mark -->
  <g transform="translate(400,205)" text-anchor="middle">
    <text font-family="'IBM Plex Mono', monospace" font-size="15" fill="#6B7280" letter-spacing="1">$ deploy --status</text>
    <rect x="94" y="-13" width="8" height="16" fill="#C9A227">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.49;0.5;0.99;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(400,250)" text-anchor="middle">
    <text font-family="'Inter', sans-serif" font-weight="600" font-size="26" fill="#E8E6DF">Coming Soon</text>
  </g>

  <g transform="translate(400,280)" text-anchor="middle">
    <text font-family="'Inter', sans-serif" font-size="13" fill="#6B7280">This project is currently in progress</text>
  </g>

  <!-- bottom hairline rule with corner ticks, echoes a code editor gutter -->
  <line x1="28" y1="422" x2="772" y2="422" stroke="#232838" stroke-width="1"/>
  <text x="28" y="416" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#3E4453">001</text>
  <text x="772" y="416" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#3E4453" text-anchor="end">EOF</text>
</svg>
